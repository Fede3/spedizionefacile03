# Gitleaks config — SpediamoFacile
# Pre-commit hook scan + CI scan per impedire push di secrets.
# Vedi: https://github.com/gitleaks/gitleaks

[extend]
useDefault = true

# Pattern aggiuntivi specifici progetto
[[rules]]
id = "stripe-secret-key"
description = "Stripe secret key (sk_live/sk_test)"
regex = '''(?i)(sk_(live|test)_[0-9a-zA-Z]{24,})'''
tags = ["stripe", "key"]

[[rules]]
id = "stripe-restricted-key"
description = "Stripe restricted key (rk_live/rk_test)"
regex = '''(?i)(rk_(live|test)_[0-9a-zA-Z]{24,})'''
tags = ["stripe", "key"]

[[rules]]
id = "stripe-webhook-secret"
description = "Stripe webhook secret (whsec_)"
regex = '''(?i)(whsec_[0-9a-zA-Z]{24,})'''
tags = ["stripe", "webhook"]

[[rules]]
id = "brt-credentials"
description = "BRT API credentials in code"
regex = '''(?i)(BRT_(CLIENT_ID|PASSWORD|PUDO_TOKEN)\s*=\s*["'][^"'\s]{8,}["'])'''
tags = ["brt", "credentials"]

# File/path da ignorare nello scan
[allowlist]
description = "Path che non contengono secrets reali"
paths = [
	'''(.*?)\.env\.example$''',
	'''(.*?)\.env\.testing$''',
	'''(.*?)/tests?/.*$''',
	'''(.*?)/fixtures?/.*$''',
	'''(.*?)/database/factories/.*$''',
	'''(.*?)/database/seeders/.*$''',
	'''docs/.*''',
	'''CHANGELOG\.md$''',
	'''composer\.lock$''',
	'''package-lock\.json$''',
]
regexes = [
	# Dummy keys nei docs/test
	'''sk_test_(dummy|fake|example|xxx)[a-zA-Z0-9]*''',
	'''pk_test_[a-zA-Z0-9]+''',  # public Stripe key è lecita
]
