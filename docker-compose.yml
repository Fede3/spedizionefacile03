# SpediamoFacile — stack locale completo Docker compose.
#
# Servizi:
#   - postgres : DB parity con prod (volume persistente)
#   - redis    : cache/queue parity
#   - laravel  : API Laravel 11 su :8000 (php artisan serve)
#   - nuxt     : SPA Nuxt 4 su :3001 (HMR via bind mount)
#   - caddy    : reverse proxy :8787 → split routing api/spa
#
# Uso:
#   docker compose up -d                  # avvia tutto
#   docker compose up -d postgres redis   # solo DB stack
#   docker compose down                   # stop senza rimuovere volumi
#   docker compose down -v                # reset completo
#
# Health check: postgres ~3s, redis ~1s, laravel ~15s, nuxt ~25s, caddy ~10s.
# Apri http://127.0.0.1:8787 quando "caddy: healthy".

services:
  postgres:
    image: postgres:15-alpine
    container_name: spediamofacile-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: spediamofacile
      POSTGRES_USER: spediamofacile
      POSTGRES_PASSWORD: spediamofacile_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spediamofacile -d spediamofacile"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spediamofacile-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  laravel:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.laravel
    container_name: spediamofacile-laravel
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://127.0.0.1:8787
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: spediamofacile
      DB_USERNAME: spediamofacile
      DB_PASSWORD: spediamofacile_local
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SANCTUM_STATEFUL_DOMAINS: 127.0.0.1:8787
    volumes:
      - .:/var/www/html
      - laravel_vendor:/var/www/html/vendor
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health/live"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

  nuxt:
    build:
      context: ./apps/web
      target: dev
    container_name: spediamofacile-nuxt
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      NUXT_PUBLIC_API_BASE: http://127.0.0.1:8787
    volumes:
      - ./apps/web:/app
      - nuxt_node_modules:/app/node_modules
    expose:
      - "3001"
    depends_on:
      laravel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  caddy:
    build:
      context: ./infra/caddy
    container_name: spediamofacile-caddy
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      SF_BACKEND_PROXY_TARGET: laravel:8000
      SF_FRONTEND_PROXY_TARGET: nuxt:3001
    depends_on:
      laravel:
        condition: service_healthy
      nuxt:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8787/"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5

volumes:
  postgres_data:
    name: spediamofacile_postgres_data
  redis_data:
    name: spediamofacile_redis_data
  laravel_vendor:
    name: spediamofacile_laravel_vendor
  nuxt_node_modules:
    name: spediamofacile_nuxt_node_modules
