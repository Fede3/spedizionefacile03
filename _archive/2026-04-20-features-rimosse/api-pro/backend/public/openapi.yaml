openapi: 3.0.3
info:
  title: SpediamoFacile — API Pro v1
  description: |
    API pubbliche per i Partner Pro di SpediamoFacile.
    Tutti gli endpoint richiedono una chiave API Pro passata come header
    `X-Pro-Api-Key: <chiave>`. La chiave si genera dalla dashboard pro,
    sezione "Chiavi API". Ogni chiave ha scope limitati
    (`shipments:read`, `shipments:write`, `tracking:read`).
  version: "1.0.0"
  contact:
    name: Team SpediamoFacile
    email: supporto@spediamofacile.it

servers:
  - url: https://api.spediamofacile.it
    description: Produzione
  - url: http://localhost:8000
    description: Sviluppo locale

security:
  - ProApiKey: []

tags:
  - name: Spedizioni
    description: Creazione, lettura e tracking di spedizioni lato Partner Pro.

paths:
  /api/v1/shipments:
    get:
      tags: [Spedizioni]
      summary: Lista spedizioni del partner
      description: |
        Ritorna le spedizioni dell'utente associato alla chiave.
        Paginazione Laravel standard.
      parameters:
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
          description: Numero di record per pagina (max 100).
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
      security:
        - ProApiKey: [shipments:read]
      responses:
        '200':
          description: Elenco spedizioni.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ShipmentListItem'
                  meta:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Spedizioni]
      summary: Crea una nuova spedizione
      description: |
        Crea una spedizione minimale con un solo pacco.
        Il prezzo viene calcolato lato server sulla base del peso;
        la risposta contiene `order_id` e `price_cents` (centesimi).
      security:
        - ProApiKey: [shipments:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShipmentCreateRequest'
      responses:
        '201':
          description: Spedizione creata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      order_id: { type: integer, example: 12345 }
                      status: { type: string, example: pending }
                      price_cents: { type: integer, example: 890 }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/shipments/{id}/tracking:
    get:
      tags: [Spedizioni]
      summary: Tracking di una spedizione
      description: |
        Ritorna i dati BRT correnti: stato, numero tracking, timestamp
        ultimo polling. Alias pratico del path `/api/v1/tracking/{id}`.
      security:
        - ProApiKey: [tracking:read]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
          description: ID ordine interno (restituito alla creazione).
      responses:
        '200':
          description: Dati tracking.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ShipmentTracking'
        '404':
          description: Spedizione non trovata per l'utente associato alla chiave.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

components:
  securitySchemes:
    ProApiKey:
      type: apiKey
      in: header
      name: X-Pro-Api-Key
      description: |
        Chiave API Pro. Passata come header `X-Pro-Api-Key`. Alternativa
        accettata (futura) Bearer token; verificare la dashboard.

  schemas:
    ShipmentListItem:
      type: object
      properties:
        id: { type: integer, example: 42 }
        status: { type: string, example: processing }
        subtotal:
          type: integer
          description: Totale in centesimi (es. 1590 = 15,90 EUR).
          example: 1590
        brt_tracking_number: { type: string, nullable: true, example: BRT0123456789 }
        brt_parcel_id: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ShipmentCreateRequest:
      type: object
      required:
        - tipo_collo
        - peso_kg
        - lunghezza_cm
        - larghezza_cm
        - altezza_cm
        - origine_nome
        - origine_indirizzo
        - origine_cap
        - origine_citta
        - origine_provincia
        - destinazione_nome
        - destinazione_indirizzo
        - destinazione_cap
        - destinazione_citta
        - destinazione_provincia
      properties:
        tipo_collo: { type: string, example: Pacco, maxLength: 50 }
        peso_kg: { type: number, format: float, minimum: 0.1, maximum: 100, example: 5.5 }
        lunghezza_cm: { type: number, format: float, minimum: 1, maximum: 120, example: 30 }
        larghezza_cm: { type: number, format: float, minimum: 1, maximum: 120, example: 20 }
        altezza_cm:  { type: number, format: float, minimum: 1, maximum: 120, example: 15 }
        origine_nome: { type: string, maxLength: 100, example: "Mario Rossi" }
        origine_indirizzo: { type: string, maxLength: 200, example: "Via Roma 1" }
        origine_cap: { type: string, pattern: '^\d{5}$', example: "20121" }
        origine_citta: { type: string, maxLength: 100, example: Milano }
        origine_provincia: { type: string, pattern: '^[A-Za-z]{2}$', example: MI }
        destinazione_nome: { type: string, maxLength: 100, example: "Luigi Verdi" }
        destinazione_indirizzo: { type: string, maxLength: 200, example: "Via Napoli 5" }
        destinazione_cap: { type: string, pattern: '^\d{5}$', example: "00185" }
        destinazione_citta: { type: string, maxLength: 100, example: Roma }
        destinazione_provincia: { type: string, pattern: '^[A-Za-z]{2}$', example: RM }
        destinazione_email: { type: string, format: email, maxLength: 150 }
        destinazione_telefono: { type: string, maxLength: 30 }
        contenuto: { type: string, maxLength: 200 }
        servizio: { type: string, maxLength: 50, example: standard }
        note: { type: string, maxLength: 500 }

    ShipmentTracking:
      type: object
      properties:
        order_id: { type: integer }
        status: { type: string, example: in_transit }
        tracking_number: { type: string, nullable: true }
        parcel_id: { type: string, nullable: true }
        last_tracking_check: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Pagination:
      type: object
      properties:
        current_page: { type: integer, example: 1 }
        last_page:    { type: integer, example: 5 }
        per_page:     { type: integer, example: 25 }
        total:        { type: integer, example: 123 }

    ErrorMessage:
      type: object
      properties:
        message: { type: string, example: "Risorsa non trovata" }

    ValidationError:
      type: object
      properties:
        message: { type: string, example: "The given data was invalid." }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }

  responses:
    Unauthorized:
      description: Chiave API mancante o non valida.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorMessage' }
    Forbidden:
      description: Chiave valida ma senza scope sufficiente per l'endpoint.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorMessage' }
    ValidationError:
      description: Payload non valido.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ValidationError' }
